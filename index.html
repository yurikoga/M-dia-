<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Social Buttons</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="icon-btn"><i class="fab fa-facebook-f" style="color: #3b5998;"></i></div>
        <div class="icon-btn"><i class="fab fa-twitter" style="color: #1da1f2;"></i></div>
        <div class="icon-btn"><i class="fab fa-instagram" style="color: #e1306c;"></i></div>
        <div class="icon-btn"><i class="fab fa-github" style="color: #333;"></i></div>
        <div class="icon-btn"><i class="fab fa-youtube" style="color: #ff0000;"></i></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
